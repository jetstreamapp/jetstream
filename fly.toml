# fly.toml app configuration file generated for jetstream-staging-app on 2024-01-14T09:04:30-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "jetstream-staging-app"
primary_region = "lax"

[build]

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096
