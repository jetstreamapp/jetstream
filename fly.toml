# fly.toml app configuration file generated for jetstream-staging-app-damp-night-9195 on 2024-01-15T09:44:47-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "jetstream-staging-app-damp-night-9195"
primary_region = "iad"

[build]

[deploy]
  release_command = "yarn rollbar:upload-sourcemaps && yarn db:migrate && yarn db:seed"
  strategy = "rolling"

[env]
  ENVIRONMENT = "production"

[[mounts]]
  source = "jetstream_data"
  destination = "/data"
  initial_size = "10gb"
  auto_extend_size_threshold = 90
  auto_extend_size_increment = "5gb"
  auto_extend_size_limit = "40gb"

[http_service]
  internal_port = 3333
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 4096
