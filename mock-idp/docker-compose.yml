name: jetstream-mock-idp

# Local mock identity providers for testing SAML + OIDC SSO flows without
# touching a real IdP. Intended for dev + Playwright — do not expose publicly.
#
# Start:  yarn mock-idp:up
# Stop:   yarn mock-idp:down
# Logs:   yarn mock-idp:logs
#
# ── SAML (ory/mocksaml) ─────────────────────────────────────────────────────
#   IdP metadata   http://localhost:4000/api/saml/metadata
#   IdP SSO URL    http://localhost:4000/api/saml/sso
#   Any email logs in; NameID = email.
#
# ── OIDC (navikt/mock-oauth2-server) ────────────────────────────────────────
#   Issuer         http://localhost:4001/default
#   Discovery      http://localhost:4001/default/.well-known/openid-configuration
#   Accepts any client_id + redirect_uri; login form lets you pick the subject.

services:
  mocksaml:
    image: boxyhq/mock-saml:1.4.2
    container_name: jetstream-mocksaml
    ports:
      - '4000:4000'
    env_file:
      - ./saml-keys/saml.env
    restart: unless-stopped

  mockoidc:
    image: ghcr.io/navikt/mock-oauth2-server:3.0.1
    container_name: jetstream-mockoidc
    ports:
      - '4001:8080'
    environment:
      SERVER_PORT: '8080'
    restart: unless-stopped
