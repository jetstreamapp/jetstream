name: Publish Desktop (macOS)

# Builds, signs (Developer ID), notarizes, and publishes the macOS desktop app.
# Mirrors the local flow: `pnpm build:desktop` then `cd dist/desktop-build && pnpm publish:mac`.
#
# The signing cert is auto-imported by electron-builder via CSC_LINK/CSC_KEY_PASSWORD.
# The provisioning profile and App Store Connect API key are kept out of git
# (build-resources/.gitignore), so they're materialized from secrets at runtime.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or branch) to build"
        required: true
        default: "main"
  # Enable once the manual flow is proven rock solid: the `desktop-v*` tag that
  # release.yml pushes (via the GitHub App token) will then auto-trigger this.
  # push:
  #   tags:
  #     - "desktop-v*"

concurrency:
  group: release-desktop-macos-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 60
    environment: production
    env:
      NODE_OPTIONS: "--max_old_space_size=8192"
      # Turns on the mac signing branch in electron-builder.config.js
      IS_CODESIGNING_ENABLED: "true"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      # Notarization (notarytool) — APPLE_API_KEY (the .p8 path) is set at runtime below
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      # Developer ID cert — electron-builder imports this into a temp keychain
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      # Backblaze B2 (S3-compatible) auto-update feed; build-electron.mjs maps
      # these onto AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY for the publish step.
      BACKBLAZE_ACCESS_KEY_ID: ${{ secrets.BACKBLAZE_ACCESS_KEY_ID }}
      BACKBLAZE_SECRET_ACCESS_KEY: ${{ secrets.BACKBLAZE_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6
        with:
          version: 11.1.3

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      # electron-builder.config.js resolves the profile to build-resources/ (relative
      # to dist/desktop-build). build-resources/.gitignore keeps it out of the repo.
      - name: Write provisioning profile
        env:
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p build-resources
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > build-resources/Jetstream_Mac_App_Profile.provisionprofile

      # Decode the .p8 to an absolute path and expose it as APPLE_API_KEY; the publish
      # step runs from dist/desktop-build, so a relative path would not resolve.
      - name: Write App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
        run: |
          KEY_PATH="$RUNNER_TEMP/apple_api_key.p8"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          echo "APPLE_API_KEY=$KEY_PATH" >> "$GITHUB_ENV"

      # TEMPORARY: diagnose the "MAC verification failed" cert import error.
      # Prints only lengths/hashes/pass-fail — never the secret values themselves.
      # Compare the decoded sha256 below against the local .p12 you encoded.
      - name: Debug signing certificate (safe)
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -uo pipefail
          echo "base64 length:   ${#CSC_LINK}"
          echo "password length: ${#CSC_KEY_PASSWORD}"
          printf '%s' "$CSC_LINK" | base64 --decode > /tmp/cert.p12 || echo "!! base64 decode failed"
          echo "decoded size:    $(wc -c < /tmp/cert.p12) bytes"
          echo "decoded sha256:  $(shasum -a 256 /tmp/cert.p12 | awk '{print $1}')"
          echo "--- openssl verify (modern) ---"
          openssl pkcs12 -info -in /tmp/cert.p12 -noout -passin pass:"$CSC_KEY_PASSWORD" && echo "PASS modern" || echo "FAIL modern"
          echo "--- openssl verify (legacy) ---"
          openssl pkcs12 -info -in /tmp/cert.p12 -noout -passin pass:"$CSC_KEY_PASSWORD" -legacy && echo "PASS legacy" || echo "FAIL legacy"
          echo "--- security import test ---"
          security create-keychain -p tmp-pass /tmp/debug.keychain
          security import /tmp/cert.p12 -k /tmp/debug.keychain -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign \
            && echo "PASS security import" || echo "FAIL security import"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client is not generated on install; the desktop build needs it.
      # `prisma generate` doesn't connect to the database, but the Prisma config
      # still resolves this env var, so a placeholder is required.
      - name: Generate database client
        run: pnpm db:generate
        env:
          JETSTREAM_POSTGRES_DBURI: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      # Builds the nx desktop projects and assembles dist/desktop-build,
      # writing the .env (Apple + Backblaze creds) that electron-builder reads.
      - name: Build desktop bundle
        run: pnpm build:desktop

      # electron-builder --mac -p always: signs, notarizes, and publishes the
      # dmg/zip installers + update metadata to the Backblaze feed.
      - name: Package, sign, notarize, and publish macOS installers
        working-directory: dist/desktop-build
        run: pnpm publish:mac
