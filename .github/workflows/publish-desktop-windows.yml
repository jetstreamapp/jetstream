name: Publish Desktop (Windows)

# Builds, signs (Azure Trusted Signing), and publishes the Windows desktop app.
# Mirrors the local flow: `pnpm build:desktop` then `cd dist/desktop-build && pnpm publish:win`.
#
# Triggered automatically by the `desktop-v*` tag that the main Release workflow
# (release.yml) pushes via the GitHub App token, so it builds the already-bumped
# version. Can also be dispatched manually against any ref.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or branch) to build"
        required: true
        default: "main"
  push:
    tags:
      - "desktop-v*"

concurrency:
  group: release-desktop-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      NODE_OPTIONS: "--max_old_space_size=8192"
      # Turns on the win `azureSignOptions` branch in electron-builder.config.js
      IS_CODESIGNING_ENABLED: "true"
      # Azure Trusted Signing — consumed by Azure Identity EnvironmentCredential
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_DESKTOP_UPDATES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_DESKTOP_UPDATES_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_DESKTOP_UPDATES_ENDPOINT_URL }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0

      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          cache: "pnpm"

      # The TrustedSigning PowerShell module that electron-builder installs at
      # sign time runs on .NET 8. Without it, signing fails with SignTool exit 3.
      - name: Setup .NET 8 runtime
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: "8.0.x"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Prisma client is not generated on install; the desktop build needs it.
      # `prisma generate` doesn't connect to the database, but the Prisma config
      # still resolves this env var, so a placeholder is required.
      - name: Generate database client
        run: pnpm db:generate
        env:
          JETSTREAM_POSTGRES_DBURI: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      # Builds the nx desktop projects and assembles dist/desktop-build,
      # writing the .env (Azure + S3-compatible storage creds) that electron-builder reads.
      - name: Build desktop bundle
        run: pnpm build:desktop

      # electron-builder --win -p always: signs via Azure Trusted Signing, uploads installers
      # + update metadata to the R2 desktop-updates bucket, and points clients at the release feed subdomain.
      - name: Package, sign, and publish Windows installers
        working-directory: dist/desktop-build
        run: pnpm publish:win
